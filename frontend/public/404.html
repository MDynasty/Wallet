<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wallet</title>
    <!--
      GitHub Pages SPA redirect — single page apps don't work with GitHub Pages
      out of the box because the server returns 404 for paths like /dashboard.
      This script encodes the current URL and redirects to the root so that
      the React app can handle routing on load.
      Technique: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; // keep /Wallet segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
